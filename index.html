<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Background Orbs -->
    <div class="orb w-96 h-96 bg-purple-600 top-0 left-0"></div>
    <div class="orb w-80 h-80 bg-blue-600 bottom-0 right-0"></div>
    <div class="orb w-72 h-72 bg-pink-600 top-1/2 left-1/3"></div>

    <!-- Chat Interface -->
    <main id="chat-container" class="flex-grow overflow-y-auto p-6 backdrop-blur-sm">
        <h1 class="text-center text-3xl font-bold mt-10">Helix</h1>
        <div id="chat-history" class="max-w-2xl mx-auto mt-6 space-y-4"></div>
    </main>

    <!-- Input Area -->
    <footer class="p-6">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input id="user-input" type="text" placeholder="Message Helix..." class="w-full bg-gray-900/80 p-4 rounded-xl border border-gray-700 text-white focus:outline-none focus:border-purple-500">
            <button id="send-btn" class="bg-purple-600 px-6 py-4 rounded-xl hover:bg-purple-700 transition">Send</button>
        </div>
        <p class="text-center text-xs text-gray-500 mt-4">Powered by ♣︎leoskyler♣︎</p>
    </footer>

    <script src="https://js.puter.com/v2/"></script>
    <script src="app.js"></script>
</body>
</html>
