<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white h-screen flex flex-col">

    <!-- Chat container -->
    <div id="chat-container" class="flex-grow overflow-y-auto p-4">
        <h1 class="text-center text-2xl font-bold mt-10">Helix</h1>
        <div id="chat-history" class="max-w-2xl mx-auto mt-6 space-y-4">
            <!-- Messages will appear here -->
        </div>
    </div>

    <!-- Input area -->
    <div class="p-4 border-t border-gray-800">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input id="user-input" type="text" placeholder="Type a message to Helix..." class="w-full bg-gray-900 p-3 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-500">
            <button id="send-btn" class="bg-purple-600 px-6 py-3 rounded-xl hover:bg-purple-700">Send</button>
        </div>
        <p class="text-center text-xs text-gray-500 mt-4">Powered by ♣︎leoskyler♣︎</p>
    </div>

</body>
</html>
